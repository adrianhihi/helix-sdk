<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helix Lab — Gene World</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0f1a;
  font-family: 'Bricolage Grotesque', sans-serif;
  color: #f1f5f9;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Nav ──────────────────────────── */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: rgba(10,15,26,0.9);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.nav-brand {
  font-size: 14px; font-weight: 700; color: #f1f5f9;
  display: flex; align-items: center; gap: 8px;
}
.nav-center { display: flex; align-items: center; gap: 8px; }
.nav-links { display: flex; gap: 6px; }
.nav-link {
  font-size: 11px; padding: 5px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6); text-decoration: none;
  transition: all .15s; font-family: 'Bricolage Grotesque', sans-serif;
}
.nav-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
.nav-link.active { background: #0d9488; color: #fff; border-color: #0d9488; }

/* Mode toggle */
.mode-toggle {
  display: flex; gap: 0; background: rgba(255,255,255,0.08);
  border-radius: 6px; padding: 2px; margin-left: 12px;
}
.mode-btn {
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
  padding: 4px 12px; border-radius: 4px; border: none;
  background: transparent; color: rgba(255,255,255,0.5);
  cursor: pointer; transition: all .15s; letter-spacing: 0.05em;
}
.mode-btn.active { background: #0d9488; color: #fff; }
.mode-btn:hover:not(.active) { color: #fff; }

/* Live badge */
.live-badge {
  font-family: 'DM Mono', monospace; font-size: 10px;
  padding: 3px 10px; border-radius: 4px;
  background: rgba(239,68,68,0.15); color: #ef4444;
  display: none; align-items: center; gap: 5px;
}
.live-badge.connected { background: rgba(34,197,94,0.15); color: #22c55e; display: inline-flex; }
.live-badge.waiting { background: rgba(251,191,36,0.15); color: #fbbf24; display: inline-flex; }
.live-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.live-badge.connected .dot { animation: livePulse 1.5s infinite; }
@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Layout ───────────────────────── */
.main { display: flex; flex-direction: column; height: calc(100vh - 49px); }
.canvas-section { flex: 1; position: relative; min-height: 400px; }
canvas { display: block; width: 100%; height: 100%; }

/* Stats bar */
.stats-bar {
  display: flex; justify-content: center; gap: 32px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.03);
  border-top: 1px solid rgba(255,255,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.stat { text-align: center; }
.stat-value {
  font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 700;
}
.stat-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4); margin-top: 2px;
}
.stat-value.green { color: #22c55e; }
.stat-value.red { color: #ef4444; }
.stat-value.amber { color: #fbbf24; }
.stat-value.teal { color: #14b8a6; }

/* ── Bottom panels ────────────────── */
.bottom { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; border-top: 1px solid rgba(255,255,255,0.06); }
.bottom-panel {
  padding: 14px 18px;
  border-right: 1px solid rgba(255,255,255,0.06);
  max-height: 260px; overflow-y: auto;
}
.bottom-panel:last-child { border-right: none; }
.panel-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: rgba(255,255,255,0.5);
  margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.panel-title .icon { font-size: 14px; }

/* Event log */
.elog {
  font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.7;
  color: rgba(255,255,255,0.6);
}
.elog-line { white-space: nowrap; animation: fadeSlide .2s ease; }
@keyframes fadeSlide { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

/* Compare cards */
.compare-row { display: flex; gap: 10px; }
.compare-card {
  flex: 1; padding: 12px; border-radius: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  text-align: center;
}
.compare-card.bad { border-color: rgba(239,68,68,0.3); }
.compare-card.good { border-color: rgba(34,197,94,0.3); }
.compare-big {
  font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 700;
  margin: 6px 0 4px;
}
.compare-big.red { color: #ef4444; }
.compare-big.green { color: #22c55e; }
.compare-label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.06em; }
.compare-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }

/* Config wizard */
.config-tabs { display: flex; gap: 0; margin-bottom: 10px; }
.config-tab {
  font-family: 'DM Mono', monospace; font-size: 10px;
  padding: 4px 10px; border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: rgba(255,255,255,0.4);
  cursor: pointer; transition: all .15s;
}
.config-tab:first-child { border-radius: 4px 0 0 4px; }
.config-tab:last-child { border-radius: 0 4px 4px 0; }
.config-tab.active { background: rgba(20,184,166,0.2); color: #14b8a6; border-color: rgba(20,184,166,0.4); }
.config-body { font-family: 'DM Mono', monospace; font-size: 11px; }
.config-field { margin-bottom: 8px; }
.config-field label { display: block; font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
.config-field input, .config-field select {
  width: 100%; padding: 5px 8px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
  color: #f1f5f9; font-family: 'DM Mono', monospace; font-size: 11px;
}
.config-code {
  background: rgba(0,0,0,0.3); border-radius: 6px; padding: 10px;
  font-size: 11px; line-height: 1.6; white-space: pre-wrap;
  color: #94a3b8; max-height: 180px; overflow-y: auto;
}
.config-code .ck { color: #c084fc; }
.config-code .cs { color: #22c55e; }
.config-code .cn { color: #fbbf24; }
.config-code .cv { color: #60a5fa; }

/* Controls overlay */
.controls {
  position: absolute; bottom: 12px; right: 12px;
  display: flex; gap: 6px; z-index: 10;
}
.ctrl-btn {
  width: 32px; height: 32px; border-radius: 6px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6); font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* Boot button overlay */
.boot-overlay {
  position: absolute; inset: 0; display: flex;
  align-items: center; justify-content: center; z-index: 20;
  background: rgba(10,15,26,0.7); backdrop-filter: blur(4px);
}
.boot-btn {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 16px; font-weight: 700;
  padding: 14px 40px; border-radius: 12px;
  background: linear-gradient(135deg, #0d9488, #0891b2);
  color: #fff; border: none; cursor: pointer;
  box-shadow: 0 8px 32px rgba(13,148,136,0.4);
  transition: all .2s;
}
.boot-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(13,148,136,0.5); }
.boot-overlay.hidden { display: none; }

/* Speed slider */
.speed-control {
  position: absolute; bottom: 12px; left: 12px; z-index: 10;
  display: flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: rgba(255,255,255,0.4);
}
.speed-control input[type=range] {
  width: 80px; height: 3px; -webkit-appearance: none;
  background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
}
.speed-control input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: #14b8a6; cursor: pointer;
}

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<!-- Nav -->
<div class="nav">
  <div class="nav-brand">🧬 Helix SDK</div>
  <div class="nav-center">
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/dashboard" class="nav-link">Live Demo</a>
      <a href="/gene-world" class="nav-link active">Gene World</a>
      <a href="/scenarios" class="nav-link">3 Scenarios</a>
      <a href="/automaton" class="nav-link">Web4 Survival</a>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-demo" onclick="setMode('demo')">DEMO</button>
      <button class="mode-btn" id="mode-live" onclick="setMode('live')">LIVE</button>
    </div>
    <span class="live-badge" id="liveBadge"><span class="dot"></span> <span id="liveBadgeText">waiting</span></span>
  </div>
  <div style="width:80px"></div>
</div>

<!-- Main -->
<div class="main">
  <!-- Canvas -->
  <div class="canvas-section" id="canvasSection">
    <canvas id="lab"></canvas>
    <div class="boot-overlay" id="bootOverlay">
      <button class="boot-btn" onclick="bootLab()">🧬 Boot Lab</button>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="cam.ry-=0.15" title="Rotate left">↶</button>
      <button class="ctrl-btn" onclick="cam.ry+=0.15" title="Rotate right">↷</button>
      <button class="ctrl-btn" onclick="cam.zoom=Math.min(2,cam.zoom+0.1)" title="Zoom in">+</button>
      <button class="ctrl-btn" onclick="cam.zoom=Math.max(0.4,cam.zoom-0.1)" title="Zoom out">−</button>
      <button class="ctrl-btn" onclick="cam.ry=0;cam.zoom=1;cam.panX=0;cam.panY=0" title="Reset">⟲</button>
    </div>
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" min="200" max="3000" value="1200" id="speedSlider" oninput="sim.speed=+this.value">
      <span id="speedLabel">1.2s</span>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat"><div class="stat-value green" id="statOps">0</div><div class="stat-label">Operations</div></div>
    <div class="stat"><div class="stat-value red" id="statFails">0</div><div class="stat-label">Failures</div></div>
    <div class="stat"><div class="stat-value teal" id="statRepairs">0</div><div class="stat-label">Repairs</div></div>
    <div class="stat"><div class="stat-value amber" id="statSaved">$0</div><div class="stat-label">Impact Saved</div></div>
    <div class="stat"><div class="stat-value" style="color:rgba(255,255,255,0.6)" id="statCapsules">0</div><div class="stat-label">Capsules</div></div>
  </div>

  <!-- Bottom panels -->
  <div class="bottom">
    <!-- Event log -->
    <div class="bottom-panel">
      <div class="panel-title"><span class="icon">📋</span> Event Log</div>
      <div class="elog" id="eventLog"></div>
    </div>

    <!-- Compare -->
    <div class="bottom-panel">
      <div class="panel-title"><span class="icon">⚖️</span> Compare</div>
      <div class="compare-row">
        <div class="compare-card bad">
          <div class="compare-label">Without Helix</div>
          <div class="compare-big red" id="cmpBad">0/0</div>
          <div class="compare-sub" id="cmpBadSub">—</div>
        </div>
        <div class="compare-card good">
          <div class="compare-label">With Helix</div>
          <div class="compare-big green" id="cmpGood">0/0</div>
          <div class="compare-sub" id="cmpGoodSub">—</div>
        </div>
      </div>
    </div>

    <!-- Config -->
    <div class="bottom-panel">
      <div class="panel-title"><span class="icon">⚙️</span> Config Wizard</div>
      <div class="config-tabs">
        <button class="config-tab active" onclick="showConfigTab(0)">I/O</button>
        <button class="config-tab" onclick="showConfigTab(1)">Setup</button>
        <button class="config-tab" onclick="showConfigTab(2)">Generated</button>
      </div>
      <div class="config-body" id="configBody">
        <!-- Tab 0: I/O -->
        <div class="config-page" id="cfgTab0">
          <div class="config-field">
            <label>Company Name</label>
            <input type="text" id="cfgCompany" value="DoorDash" oninput="updateGenCode()">
          </div>
          <div class="config-field">
            <label>API Endpoint</label>
            <input type="text" id="cfgEndpoint" value="https://api.example.com/v1" oninput="updateGenCode()">
          </div>
          <div class="config-field">
            <label>Agent ID</label>
            <input type="text" id="cfgAgentId" value="ops-agent-01" oninput="updateGenCode()">
          </div>
        </div>
        <!-- Tab 1: Setup -->
        <div class="config-page" id="cfgTab1" style="display:none">
          <div class="config-field">
            <label>Error Types to Handle</label>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px" id="errorToggles"></div>
          </div>
          <div class="config-field" style="margin-top:10px">
            <label>Strategies</label>
            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px" id="stratToggles"></div>
          </div>
        </div>
        <!-- Tab 2: Generated -->
        <div class="config-page" id="cfgTab2" style="display:none">
          <div class="config-code" id="genCode"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Canvas setup ─────────────────────────────────
const C = document.getElementById('lab');
const ctx = C.getContext('2d');
let W, H;

function resize() {
  const sec = document.getElementById('canvasSection');
  W = C.width = sec.clientWidth * devicePixelRatio;
  H = C.height = sec.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Camera ───────────────────────────────────────
const cam = { ry: 0, zoom: 1, panX: 0, panY: 0 };
let dragging = false, dragStart = { x:0, y:0 };

C.addEventListener('mousedown', e => { dragging = true; dragStart = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  cam.panX += (e.clientX - dragStart.x) * 0.8;
  cam.panY += (e.clientY - dragStart.y) * 0.8;
  dragStart = { x: e.clientX, y: e.clientY };
});
window.addEventListener('mouseup', () => dragging = false);
C.addEventListener('wheel', e => {
  e.preventDefault();
  cam.zoom = Math.max(0.3, Math.min(2.5, cam.zoom - e.deltaY * 0.001));
}, { passive: false });

// ── Isometric helpers ────────────────────────────
function iso(x, y, z) {
  const cosR = Math.cos(cam.ry), sinR = Math.sin(cam.ry);
  const rx = x * cosR - y * sinR;
  const ry = x * sinR + y * cosR;
  const sx = (rx - ry) * 0.866;
  const sy = (rx + ry) * 0.5 - z;
  const cw = W / devicePixelRatio, ch = H / devicePixelRatio;
  return {
    x: cw / 2 + sx * cam.zoom + cam.panX,
    y: ch / 2 + sy * cam.zoom + cam.panY
  };
}

function shade(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return `rgb(${r},${g},${b})`;
}

function isoBox(x, y, z, w, h, d, color, alpha) {
  alpha = alpha || 1;
  const top = shade(color, 30);
  const right = shade(color, -30);
  const left = shade(color, -60);

  const p = [
    iso(x, y, z + d),       // 0 top-front-left
    iso(x + w, y, z + d),   // 1 top-front-right
    iso(x + w, y + h, z + d), // 2 top-back-right
    iso(x, y + h, z + d),   // 3 top-back-left
    iso(x, y, z),           // 4 bot-front-left
    iso(x + w, y, z),       // 5 bot-front-right
    iso(x + w, y + h, z),   // 6 bot-back-right
    iso(x, y + h, z),       // 7 bot-back-left
  ];

  ctx.globalAlpha = alpha;

  // Top face
  ctx.beginPath();
  ctx.moveTo(p[0].x, p[0].y); ctx.lineTo(p[1].x, p[1].y);
  ctx.lineTo(p[2].x, p[2].y); ctx.lineTo(p[3].x, p[3].y);
  ctx.closePath(); ctx.fillStyle = top; ctx.fill();

  // Right face
  ctx.beginPath();
  ctx.moveTo(p[1].x, p[1].y); ctx.lineTo(p[5].x, p[5].y);
  ctx.lineTo(p[6].x, p[6].y); ctx.lineTo(p[2].x, p[2].y);
  ctx.closePath(); ctx.fillStyle = right; ctx.fill();

  // Left face
  ctx.beginPath();
  ctx.moveTo(p[0].x, p[0].y); ctx.lineTo(p[4].x, p[4].y);
  ctx.lineTo(p[7].x, p[7].y); ctx.lineTo(p[3].x, p[3].y);
  ctx.closePath(); ctx.fillStyle = left; ctx.fill();

  ctx.globalAlpha = 1;
}

// ── Agents ───────────────────────────────────────
const AGENTS = [
  { id: 'ORDER_DISPATCH',   label: 'ORDERS',   color: '#3b82f6', pos: { x: -80, y: -80 }, state: 'idle', walkT: 0, walkDir: 0 },
  { id: 'ETA_PREDICTION',   label: 'ETA',      color: '#8b5cf6', pos: { x:  80, y: -80 }, state: 'idle', walkT: 0, walkDir: 0 },
  { id: 'CUSTOMER_SUPPORT', label: 'SUPPORT',  color: '#06b6d4', pos: { x: -110, y:  20 }, state: 'idle', walkT: 0, walkDir: 0 },
  { id: 'FRAUD_DETECTION',  label: 'FRAUD',    color: '#f59e0b', pos: { x:  110, y:  20 }, state: 'idle', walkT: 0, walkDir: 0 },
  { id: 'DEMAND_FORECAST',  label: 'FORECAST', color: '#10b981', pos: { x: -60, y:  100 }, state: 'idle', walkT: 0, walkDir: 0 },
  { id: 'DRIVER_INCENTIVE', label: 'INCENTIVE',color: '#ec4899', pos: { x:  60, y:  100 }, state: 'idle', walkT: 0, walkDir: 0 },
];

function getAgent(opId) { return AGENTS.find(a => a.id === opId); }

// ── Gene Library ─────────────────────────────────
const geneLib = { x: 0, y: 0, capsules: 0, dnaAngle: 0 };

// ── Particles ────────────────────────────────────
let particles = [];

function emitCapsule(fromAgent) {
  const a = getAgent(fromAgent);
  if (!a) return;
  const from = iso(a.pos.x, a.pos.y, 30);
  for (let i = 0; i < AGENTS.length; i++) {
    if (AGENTS[i].id === fromAgent) continue;
    const to = iso(AGENTS[i].pos.x, AGENTS[i].pos.y, 30);
    particles.push({
      x: from.x, y: from.y,
      tx: to.x, ty: to.y,
      t: 0, speed: 0.015 + Math.random() * 0.01,
      color: a.color, size: 3
    });
  }
  geneLib.capsules++;
}

// ── Float texts ──────────────────────────────────
let floatTexts = [];
function addFloat(x, y, text, color) {
  floatTexts.push({ x, y, text, color, life: 1 });
}

// ── Error rings ──────────────────────────────────
let errorRings = [];
function addErrorRing(agentId) {
  const a = getAgent(agentId);
  if (!a) return;
  const p = iso(a.pos.x, a.pos.y, 25);
  errorRings.push({ x: p.x, y: p.y, r: 5, maxR: 40, life: 1, color: '#ef4444' });
}

// ── Drawing ──────────────────────────────────────
function drawFloor() {
  const s = 160;
  for (let gx = -2; gx <= 2; gx++) {
    for (let gy = -2; gy <= 2; gy++) {
      const cx = gx * 50, cy = gy * 50;
      const p0 = iso(cx - 25, cy - 25, 0);
      const p1 = iso(cx + 25, cy - 25, 0);
      const p2 = iso(cx + 25, cy + 25, 0);
      const p3 = iso(cx - 25, cy + 25, 0);
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y);
      ctx.closePath();
      ctx.fillStyle = (gx + gy) % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.035)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

function drawGeneLibrary(t) {
  // Base pedestal
  isoBox(-15, -15, 0, 30, 30, 8, '#134e4a', 0.8);
  // Core
  isoBox(-10, -10, 8, 20, 20, 30, '#0d9488', 0.6);

  // DNA helix
  const cx = iso(0, 0, 38);
  geneLib.dnaAngle += 0.03;
  for (let i = 0; i < 12; i++) {
    const a = geneLib.dnaAngle + i * 0.5;
    const r = 8;
    const dx = Math.cos(a) * r;
    const dy = Math.sin(a) * 2;
    const dz = i * 3 - 18;
    const p = iso(dx, dy, 38 + dz);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = i % 2 === 0 ? '#14b8a6' : '#2dd4bf';
    ctx.globalAlpha = 0.8;
    ctx.fill();
    ctx.globalAlpha = 1;
    // Connecting line
    const dx2 = Math.cos(a + Math.PI) * r;
    const dy2 = Math.sin(a + Math.PI) * 2;
    const p2 = iso(dx2, dy2, 38 + dz);
    ctx.beginPath();
    ctx.arc(p2.x, p2.y, 2, 0, Math.PI * 2);
    ctx.fillStyle = i % 2 === 0 ? '#5eead4' : '#99f6e4';
    ctx.globalAlpha = 0.6;
    ctx.fill();
    ctx.globalAlpha = 1;
    // Bridge
    ctx.beginPath();
    ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = 'rgba(94,234,212,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Label
  ctx.font = '600 9px "DM Mono", monospace';
  ctx.fillStyle = '#14b8a6';
  ctx.textAlign = 'center';
  const lp = iso(0, 0, 58);
  ctx.fillText('GENE LIBRARY', lp.x, lp.y);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '400 8px "DM Mono", monospace';
  ctx.fillText(geneLib.capsules + ' capsules', lp.x, lp.y + 12);
}

function drawAgent(agent, t) {
  const { pos, color, label, state, walkT, walkDir } = agent;
  let drawX = pos.x, drawY = pos.y, drawZ = 0;

  // Walk animation toward gene library
  if (state === 'walking-to-lib') {
    const progress = walkT;
    drawX = pos.x * (1 - progress);
    drawY = pos.y * (1 - progress);
    drawZ = Math.sin(progress * Math.PI) * 15; // arc
  } else if (state === 'walking-back') {
    const progress = walkT;
    drawX = pos.x * progress;
    drawY = pos.y * progress;
    drawZ = Math.sin(progress * Math.PI) * 15;
  }

  // Desk
  isoBox(pos.x - 12, pos.y - 8, 0, 24, 16, 10, '#1e293b', 0.7);

  // Worker body (at walk position)
  const headZ = drawZ + 18;
  const bodyZ = drawZ + 10;
  const p = iso(drawX, drawY, bodyZ);
  const hp = iso(drawX, drawY, headZ);

  // Body
  ctx.beginPath();
  ctx.moveTo(p.x - 5, p.y + 4); ctx.lineTo(p.x, p.y - 4); ctx.lineTo(p.x + 5, p.y + 4);
  ctx.closePath();
  ctx.fillStyle = state === 'error' ? '#ef4444' : state === 'working' ? color : shade(color, -40);
  ctx.globalAlpha = 0.9;
  ctx.fill();
  ctx.globalAlpha = 1;

  // Head
  ctx.beginPath();
  ctx.arc(hp.x, hp.y, 4, 0, Math.PI * 2);
  ctx.fillStyle = state === 'error' ? '#fca5a5' : '#e2e8f0';
  ctx.fill();

  // Glow when working
  if (state === 'working') {
    ctx.beginPath();
    ctx.arc(hp.x, hp.y, 12 + Math.sin(t * 4) * 3, 0, Math.PI * 2);
    ctx.fillStyle = color.replace(')', ',0.1)').replace('rgb', 'rgba');
    ctx.fill();
  }

  // Error pulse
  if (state === 'error') {
    ctx.beginPath();
    ctx.arc(hp.x, hp.y, 16 + Math.sin(t * 8) * 4, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(239,68,68,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Label
  const labP = iso(pos.x, pos.y, -8);
  ctx.font = '600 8px "DM Mono", monospace';
  ctx.fillStyle = state === 'error' ? '#ef4444' : 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText(label, labP.x, labP.y);

  // Status dot
  const dotP = iso(pos.x + 14, pos.y - 10, 14);
  ctx.beginPath();
  ctx.arc(dotP.x, dotP.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = state === 'idle' ? 'rgba(255,255,255,0.2)' :
                  state === 'working' ? '#22c55e' :
                  state === 'error' ? '#ef4444' : '#fbbf24';
  ctx.fill();
}

function drawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += p.speed;
    if (p.t >= 1) { particles.splice(i, 1); continue; }
    const x = p.x + (p.tx - p.x) * p.t;
    const y = p.y + (p.ty - p.y) * p.t - Math.sin(p.t * Math.PI) * 30;
    ctx.beginPath();
    ctx.arc(x, y, p.size * (1 - p.t * 0.5), 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 1 - p.t;
    ctx.fill();
    // Trail
    ctx.beginPath();
    ctx.arc(x, y, p.size * 2 * (1 - p.t), 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.15 * (1 - p.t);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawFloatTexts() {
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const ft = floatTexts[i];
    ft.life -= 0.008;
    ft.y -= 0.5;
    if (ft.life <= 0) { floatTexts.splice(i, 1); continue; }
    ctx.font = '500 10px "DM Mono", monospace';
    ctx.fillStyle = ft.color;
    ctx.globalAlpha = ft.life;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }
}

function drawErrorRings() {
  for (let i = errorRings.length - 1; i >= 0; i--) {
    const r = errorRings[i];
    r.life -= 0.015;
    r.r += 0.8;
    if (r.life <= 0) { errorRings.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = r.life * 0.6;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

// ── Render loop ──────────────────────────────────
let t = 0;
function render() {
  t += 0.016;
  const cw = W / devicePixelRatio, ch = H / devicePixelRatio;
  ctx.clearRect(0, 0, cw, ch);

  // Background gradient
  const grad = ctx.createRadialGradient(cw/2, ch/2, 0, cw/2, ch/2, cw * 0.6);
  grad.addColorStop(0, '#0f172a');
  grad.addColorStop(1, '#0a0f1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);

  drawFloor();

  // Sort agents by depth for painter's algorithm
  const sorted = [...AGENTS].sort((a, b) => {
    const da = a.pos.x + a.pos.y;
    const db = b.pos.x + b.pos.y;
    return da - db;
  });

  // Draw back agents, then gene lib, then front agents
  for (const agent of sorted) {
    if (agent.pos.x + agent.pos.y < 0) drawAgent(agent, t);
  }
  drawGeneLibrary(t);
  for (const agent of sorted) {
    if (agent.pos.x + agent.pos.y >= 0) drawAgent(agent, t);
  }

  drawParticles();
  drawFloatTexts();
  drawErrorRings();

  // Update walk animations
  for (const a of AGENTS) {
    if (a.state === 'walking-to-lib') {
      a.walkT += 0.02;
      if (a.walkT >= 1) { a.walkT = 0; a.state = 'walking-back'; }
    } else if (a.state === 'walking-back') {
      a.walkT += 0.025;
      if (a.walkT >= 1) { a.walkT = 0; a.state = 'idle'; }
    }
  }

  requestAnimationFrame(render);
}
render();

// ── Simulation state ─────────────────────────────
const sim = {
  running: false, iv: null, speed: 1200,
  iter: 0, ops: 0, fails: 0, repairs: 0, saved: 0, capsules: 0,
  phase: 'idle', // idle, part1, part2
  part1: { completed: 0, total: 20 },
  part2: { completed: 0, total: 20, repairs: 0 },
};

const OP_COST = {
  ORDER_DISPATCH: 2500, ETA_PREDICTION: 800, CUSTOMER_SUPPORT: 1200,
  FRAUD_DETECTION: 3500, DEMAND_FORECAST: 1800, DRIVER_INCENTIVE: 600
};

const OP_IDS = AGENTS.map(a => a.id);

// Scripted failures for demo mode (iter → errorType)
const DEMO_FAILURES = {
  3: { op: 'ORDER_DISPATCH', err: 'RATE_LIMIT', msg: '429 Too Many Requests' },
  8: { op: 'ETA_PREDICTION', err: 'TIMEOUT', msg: 'Request timeout after 30s' },
  11: { op: 'DEMAND_FORECAST', err: 'AUTH_EXPIRED', msg: '401 Unauthorized' },
  15: { op: 'CUSTOMER_SUPPORT', err: 'CONTEXT_OVERFLOW', msg: 'Context length exceeded' },
  18: { op: 'DRIVER_INCENTIVE', err: 'HTTP_503', msg: '503 Service Unavailable' },
};

const STRATEGIES = {
  RATE_LIMIT: ['backoff_retry', 'rotate_api_key'],
  TIMEOUT: ['increase_timeout', 'retry'],
  AUTH_EXPIRED: ['rotate_credentials', 'refresh_token'],
  CONTEXT_OVERFLOW: ['chunk_input', 'summarize_context'],
  HTTP_503: ['switch_endpoint', 'retry_with_delay'],
  JSON_PARSE: ['repair_json', 'extract_partial'],
};

function updateStats() {
  document.getElementById('statOps').textContent = sim.ops;
  document.getElementById('statFails').textContent = sim.fails;
  document.getElementById('statRepairs').textContent = sim.repairs;
  document.getElementById('statSaved').textContent = '$' + sim.saved.toLocaleString();
  document.getElementById('statCapsules').textContent = geneLib.capsules;
}

function elog(text, color) {

}

function updateCompare() {
  document.getElementById('cmpBad').textContent = sim.part1.completed + '/' + sim.part1.total;
  document.getElementById('cmpBadSub').textContent = sim.part1.completed < sim.part1.total ? '1 human intervention' : '0 interventions';
  document.getElementById('cmpGood').textContent = sim.part2.completed + '/' + sim.part2.total;

}

// ── Demo mode simulation ─────────────────────────
function bootLab() {
  document.getElementById('bootOverlay').classList.add('hidden');
  startDemo();
}

function startDemo() {
  sim.running = true;
  sim.iter = 0;
  sim.ops = 0; sim.fails = 0; sim.repairs = 0; sim.saved = 0;
  sim.part1 = { completed: 0, total: 20 };
  sim.part2 = { completed: 0, total: 20, repairs: 0 };
  geneLib.capsules = 0;
  particles = []; floatTexts = []; errorRings = [];
  document.getElementById('eventLog').innerHTML = '';
  AGENTS.forEach(a => { a.state = 'idle'; a.walkT = 0; });

  elog('🧬 Lab booted — starting Part 1 (no Helix)', '#14b8a6');
  sim.phase = 'part1';
  sim.iter = 0;

  runTick();
}

function runTick() {
  if (!sim.running) return;

  sim.iter++;
  const opIdx = (sim.iter - 1) % OP_IDS.length;
  const opId = OP_IDS[opIdx];
  const agent = getAgent(opId);

  if (sim.phase === 'part1') {
    // Part 1: crash on first scripted failure
    const fail = DEMO_FAILURES[sim.iter];
    if (fail) {
      agent.state = 'error';
      addErrorRing(opId);
      sim.fails++;
      const p = iso(agent.pos.x, agent.pos.y, 30);
      addFloat(p.x, p.y, fail.err, '#ef4444');
      elog('✗ [' + sim.iter + '] ' + agent.label + ' — ' + fail.msg, '#ef4444');
      elog('  Agent halted. Human intervention required.', '#ef4444');
      sim.part1.completed = sim.iter - 1;
      updateStats(); updateCompare();

      // Transition to Part 2 after delay
      setTimeout(() => {
        elog('', 'transparent');
        elog('━━━ Part 2: With Helix SDK ━━━', '#14b8a6');
        sim.phase = 'part2';
        sim.iter = 0;
        AGENTS.forEach(a => { a.state = 'idle'; a.walkT = 0; });
        sim.iv = setTimeout(runTick, sim.speed);
      }, 2000);
      return;
    }

    // Success
    agent.state = 'working';
    sim.ops++;
    sim.part1.completed = sim.iter;
    const p = iso(agent.pos.x, agent.pos.y, 30);
    addFloat(p.x, p.y, '✓', '#22c55e');
    elog('✓ [' + sim.iter + '] ' + agent.label + ' — success', '#22c55e');
    setTimeout(() => { if (agent.state === 'working') agent.state = 'idle'; }, 600);
    updateStats(); updateCompare();

    if (sim.iter >= 20) {
      // End part 1 (shouldn't happen with failures, but safety)
      sim.phase = 'transition';
      setTimeout(() => {
        elog('━━━ Part 2: With Helix SDK ━━━', '#14b8a6');
        sim.phase = 'part2'; sim.iter = 0;
        sim.iv = setTimeout(runTick, sim.speed);
      }, 1500);
      return;
    }

    sim.iv = setTimeout(runTick, sim.speed);

  } else if (sim.phase === 'part2') {
    // Part 2: repair failures via PCEC
    const fail = DEMO_FAILURES[sim.iter];
    if (fail) {
      agent.state = 'error';
      addErrorRing(opId);
      sim.fails++;
      const p = iso(agent.pos.x, agent.pos.y, 30);
      addFloat(p.x, p.y, fail.err, '#ef4444');
      elog('⚠️  [' + sim.iter + '] ' + agent.label + ' — ' + fail.msg, '#fbbf24');

      // PCEC sequence with delays
      setTimeout(() => {
        elog('  🔍 Perceive: ' + fail.err, '#fbbf24');
      }, 300);
      setTimeout(() => {
        const strats = STRATEGIES[fail.err] || ['retry'];
        elog('  🔧 Construct: ' + JSON.stringify(strats), '#fbbf24');
      }, 600);
      setTimeout(() => {
        const strats = STRATEGIES[fail.err] || ['retry'];
        elog('  ⚖️  Evaluate: ' + strats[0], '#fbbf24');
      }, 900);
      setTimeout(() => {
        elog('  ✅ Commit: saved to gene map', '#14b8a6');
        // Walk to gene library
        agent.state = 'walking-to-lib';
        agent.walkT = 0;
      }, 1200);
      setTimeout(() => {
        // Repair complete
        agent.state = 'idle';
        sim.repairs++;
        sim.ops++;
        sim.part2.completed++;
        sim.part2.repairs++;
        const cost = OP_COST[opId] || 1000;
        sim.saved += cost;
        emitCapsule(opId);
        const pp = iso(agent.pos.x, agent.pos.y, 30);
        addFloat(pp.x, pp.y, '↺ repaired', '#14b8a6');
        elog('  ↺ ' + agent.label + ' repaired — $' + cost.toLocaleString() + ' saved', '#14b8a6');
        updateStats(); updateCompare();

        // Continue
        if (sim.iter >= 20) {
          finishDemo();
        } else {
          sim.iv = setTimeout(runTick, sim.speed);
        }
      }, 2000);
      return;
    }

    // Success
    agent.state = 'working';
    sim.ops++;
    sim.part2.completed++;
    const p = iso(agent.pos.x, agent.pos.y, 30);
    addFloat(p.x, p.y, '✓', '#22c55e');
    elog('✓ [' + sim.iter + '] ' + agent.label + ' — success', '#22c55e');
    setTimeout(() => { if (agent.state === 'working') agent.state = 'idle'; }, 600);
    updateStats(); updateCompare();

    if (sim.iter >= 20) {
      finishDemo();
    } else {
      sim.iv = setTimeout(runTick, sim.speed);
    }
  }
}

function finishDemo() {
  sim.running = false;
  elog('', 'transparent');
  elog('━━━ Complete ━━━', '#14b8a6');
  elog('Without Helix: ' + sim.part1.completed + '/20 · 1 human intervention', '#ef4444');
  elog('With Helix:    ' + sim.part2.completed + '/20 · ' + sim.part2.repairs + ' auto-repairs · $' + sim.saved.toLocaleString() + ' saved', '#22c55e');
  updateCompare();

  // Show boot button again
  setTimeout(() => {
    const overlay = document.getElementById('bootOverlay');
    overlay.classList.remove('hidden');
    overlay.querySelector('.boot-btn').textContent = '🧬 Restart Lab';
  }, 2000);
}

function doReset() {
  clearTimeout(sim.iv);
  sim.running = false;
  sim.iter = 0; sim.ops = 0; sim.fails = 0; sim.repairs = 0; sim.saved = 0;
  sim.part1 = { completed: 0, total: 20 };
  sim.part2 = { completed: 0, total: 20, repairs: 0 };
  geneLib.capsules = 0;
  particles = []; floatTexts = []; errorRings = [];
  AGENTS.forEach(a => { a.state = 'idle'; a.walkT = 0; });
  document.getElementById('eventLog').innerHTML = '';
  updateStats(); updateCompare();
  document.getElementById('bootOverlay').classList.remove('hidden');
  document.getElementById('bootOverlay').querySelector('.boot-btn').textContent = '🧬 Boot Lab';
}

// ── Live mode ────────────────────────────────────
function setMode(mode) {
  document.getElementById('mode-demo').classList.toggle('active', mode === 'demo');
  document.getElementById('mode-live').classList.toggle('active', mode === 'live');

  if (mode === 'live') {
    clearTimeout(sim.iv);
    sim.running = false;
    document.getElementById('bootOverlay').classList.add('hidden');
    document.getElementById('eventLog').innerHTML = '';
    AGENTS.forEach(a => { a.state = 'idle'; a.walkT = 0; });
    sim.iter = 0; sim.ops = 0; sim.fails = 0; sim.repairs = 0; sim.saved = 0;
    sim.part1 = { completed: 0, total: 20 };
    sim.part2 = { completed: 0, total: 20, repairs: 0 };
    geneLib.capsules = 0;
    particles = []; floatTexts = []; errorRings = [];
    updateStats(); updateCompare();

    const badge = document.getElementById('liveBadge');
    badge.className = 'live-badge waiting';
    document.getElementById('liveBadgeText').textContent = 'connecting...';
    elog('● Connecting to /api/helix/stream?mode=enterprise ...', '#fbbf24');

    const stream = new EventSource('/api/helix/stream?mode=enterprise');
    window._helixStream = stream;

    stream.onmessage = function(e) {
      const d = JSON.parse(e.data);
      handleLiveEvent(d);
    };

    stream.onopen = function() {
      badge.className = 'live-badge connected';
      document.getElementById('liveBadgeText').textContent = 'LIVE';
      elog('● Connected — streaming enterprise events', '#22c55e');
    };

    stream.onerror = function() {
      badge.className = 'live-badge waiting';
      document.getElementById('liveBadgeText').textContent = 'disconnected';
      elog('○ Stream disconnected', '#ef4444');
    };
  } else {
    if (window._helixStream) { window._helixStream.close(); window._helixStream = null; }
    document.getElementById('liveBadge').className = 'live-badge';
    doReset();
  }
}

function handleLiveEvent(d) {
  switch (d.type) {
    case 'start':
      elog('Stream started: mode=' + d.mode, '#14b8a6');
      break;

    case 'part':
      sim.phase = d.part === 1 ? 'part1' : 'part2';
      elog('━━━ ' + d.label + ' ━━━', '#14b8a6');
      if (d.part === 2) {
        AGENTS.forEach(a => { a.state = 'idle'; a.walkT = 0; });
      }
      break;

    case 'iter': {
      const agent = getAgent(d.operation || d.source);
      if (d.status === 'ok') {
        if (agent) {
          agent.state = 'working';
          setTimeout(() => { if (agent.state === 'working') agent.state = 'idle'; }, 800);
        }
        sim.ops++;
        if (d.part === 1) sim.part1.completed++;
        else sim.part2.completed++;
        const label = agent ? agent.label : d.operation || d.source;
        elog('✓ [' + d.iter + '] ' + label + ' — ' + (d.delta || 'ok'), '#22c55e');
        if (agent) {
          const p = iso(agent.pos.x, agent.pos.y, 30);
          addFloat(p.x, p.y, '✓', '#22c55e');
        }
      } else if (d.status === 'crash') {
        if (agent) { agent.state = 'error'; addErrorRing(agent.id); }
        sim.fails++;
        elog('✗ [' + d.iter + '] ' + (d.operation || d.source) + ' — CRASH', '#ef4444');
      } else if (d.status === 'repaired') {
        if (agent) {
          agent.state = 'walking-back';
          agent.walkT = 0;
          emitCapsule(agent.id);
        }
        sim.ops++;
        sim.repairs++;
        sim.part2.completed++;
        sim.part2.repairs++;
        const cost = OP_COST[d.operation || d.source] || 1000;
        sim.saved += cost;
        elog('↺ [' + d.iter + '] ' + (agent ? agent.label : d.operation) + ' — repaired', '#14b8a6');
        if (agent) {
          const p = iso(agent.pos.x, agent.pos.y, 30);
          addFloat(p.x, p.y, '↺ repaired', '#14b8a6');
        }
      }
      updateStats(); updateCompare();
      break;
    }

    case 'crash': {
      const agent = getAgent(d.operation);
      if (agent) { agent.state = 'error'; addErrorRing(agent.id); }
      elog('💥 CRASH: ' + d.message, '#ef4444');
      break;
    }

    case 'pcec_step':
      if (d.step === 'perceive') elog('  🔍 Perceive: ' + d.value, '#fbbf24');
      else if (d.step === 'construct') elog('  🔧 Construct: ' + d.value, '#fbbf24');
      else if (d.step === 'evaluate') elog('  ⚖️  Evaluate: ' + d.value, '#fbbf24');
      else if (d.step === 'commit') {
        elog('  ✅ Commit: ' + d.value, '#14b8a6');
      }
      break;

    case 'repair_done': {
      const agent = getAgent(d.fromOperation || '');
      elog('  Repair done: ' + d.errorType + ' → ' + d.strategy, '#14b8a6');
      break;
    }

    case 'business_impact':
      if (d.prevented) {
        elog('  💰 Impact prevented: $' + d.estimatedCost.toLocaleString(), '#fbbf24');
      }
      break;

    case 'capsule_broadcast':
      if (d.fromOperation) emitCapsule(d.fromOperation);
      break;

    case 'part_summary':
      if (d.part === 1) {
        sim.part1.completed = d.completed;
        sim.part1.total = d.total;
      } else {
        sim.part2.completed = d.completed;
        sim.part2.total = d.total;
        sim.part2.repairs = d.autoRepairs;
        if (d.businessImpactSaved) sim.saved = d.businessImpactSaved;
      }
      updateCompare();
      break;

    case 'gene_map':
      geneLib.capsules = (d.repairs || []).length;
      updateStats();
      break;

    case 'immune_memory':
      elog('  🛡️ Immune memory: ' + d.operation + ' → ' + d.errorType, '#14b8a6');
      break;

    case 'done':
      elog('━━━ Stream complete ━━━', '#14b8a6');
      if (window._helixStream) { window._helixStream.close(); window._helixStream = null; }
      document.getElementById('liveBadge').className = 'live-badge waiting';
      document.getElementById('liveBadgeText').textContent = 'ended';
      break;
  }
}

});

// ── Config wizard ────────────────────────────────
const ERROR_TYPES = ['RATE_LIMIT', 'TIMEOUT', 'AUTH_EXPIRED', 'CONTEXT_OVERFLOW', 'HTTP_503', 'JSON_PARSE'];
const STRAT_LIST = ['backoff_retry', 'rotate_api_key', 'increase_timeout', 'retry', 'rotate_credentials', 'refresh_token', 'chunk_input', 'switch_endpoint', 'repair_json'];

const cfgErrors = new Set(ERROR_TYPES);
const cfgStrats = new Set(STRAT_LIST);

function initConfig() {
  const errDiv = document.getElementById('errorToggles');
  ERROR_TYPES.forEach(e => {
    const btn = document.createElement('button');
    btn.textContent = e;
    btn.style.cssText = 'font-family:"DM Mono",monospace;font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.1);color:#fca5a5;cursor:pointer;transition:all .15s';
    btn.onclick = () => {
      if (cfgErrors.has(e)) { cfgErrors.delete(e); btn.style.opacity = '0.3'; }
      else { cfgErrors.add(e); btn.style.opacity = '1'; }
      updateGenCode();
    };
    errDiv.appendChild(btn);
  });
  const stratDiv = document.getElementById('stratToggles');
  STRAT_LIST.forEach(s => {
    const btn = document.createElement('button');
    btn.textContent = s;
    btn.style.cssText = 'font-family:"DM Mono",monospace;font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid rgba(20,184,166,0.3);background:rgba(20,184,166,0.1);color:#5eead4;cursor:pointer;transition:all .15s';
    btn.onclick = () => {
      if (cfgStrats.has(s)) { cfgStrats.delete(s); btn.style.opacity = '0.3'; }
      else { cfgStrats.add(s); btn.style.opacity = '1'; }
      updateGenCode();
    };
    stratDiv.appendChild(btn);
  });
  updateGenCode();
}

function showConfigTab(idx) {
  document.querySelectorAll('.config-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.config-page').forEach((p, i) => p.style.display = i === idx ? 'block' : 'none');
}

function updateGenCode() {
  const company = document.getElementById('cfgCompany').value || 'MyCompany';
  const endpoint = document.getElementById('cfgEndpoint').value || 'https://api.example.com';
  const agentId = document.getElementById('cfgAgentId').value || 'agent-01';
  const errors = [...cfgErrors];
  const strats = [...cfgStrats];

  const code = `<span class="ck">import</span> { <span class="cv">wrap</span> } <span class="ck">from</span> <span class="cs">'@helix/sdk'</span>

<span class="ck">const</span> <span class="cv">agent</span> = <span class="ck">async</span> (input) => {
  <span class="ck">const</span> res = <span class="ck">await</span> fetch(<span class="cs">'${endpoint}'</span>)
  <span class="ck">return</span> res.json()
}

<span class="ck">const</span> <span class="cv">resilient</span> = wrap(<span class="cv">agent</span>, {
  agentId: <span class="cs">'${agentId}'</span>,
  company: <span class="cs">'${company}'</span>,
  errors: [${errors.map(e => `<span class="cs">'${e}'</span>`).join(', ')}],
  strategies: [${strats.slice(0,4).map(s => `<span class="cs">'${s}'</span>`).join(', ')}],
  geneMarket: <span class="cn">true</span>
})`;

  document.getElementById('genCode').innerHTML = code;
}

initConfig();
</script>
</body>
</html>
